version: "1.0.1"

interface:
  display_name: "PM Assistant"
  short_description: "面向开发工程师的产品教练，将模糊想法拷问成 B2C / B2B / 内部工具 / 平台型产品决策、PRD 与版本化交接包"
  default_prompt: "使用 $pm-assistant 以产品评审方式拷问我的产品想法，先完成 B2C/B2B/内部工具/平台型分流、MVP 收口、环境约束和验收标准，再按需要生成版本化 PRD、模块详设或开发交接。"

policy:
  allow_implicit_invocation: true
